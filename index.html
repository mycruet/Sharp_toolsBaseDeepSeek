<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>善器 · 物联数智化赋能平台</title>
    <style>
        :root {
            --primary: #5D9CEC;
            --primary-dark: #4A89D6;
            --primary-light: #7DB5F0;
            --sidebar-bg: #1E3348;
            --sidebar-hover: #263F58;
            --sidebar-active: #2A4A68;
            --topbar-bg: #ffffff;
            --content-bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-dark: #1a1a2e;
            --text-mid: #3a3d4a;
            --text-light: #6b7280;
            --text-white: #e8eaef;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10), 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: #eef2f7;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============ LOGIN PAGE ============ */
        .login-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }
        .login-left {
            flex: 1.15;
            background: linear-gradient(160deg, #0f1c2e 0%, #132438 25%, #0d1b2d 50%, #111f35 75%, #0a1625 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-width: 0;
        }
        .login-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(93, 156, 236, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 65%, rgba(93, 156, 236, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 45% 45%, rgba(120, 180, 250, 0.04) 0%, transparent 60%);
            pointer-events: none;
        }
        .login-left .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(93, 156, 236, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(93, 156, 236, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(600px) rotateX(55deg) scale(1.8);
            transform-origin: center center;
            animation: gridPulse 8s ease-in-out infinite;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.5) 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.5) 30%, transparent 75%);
        }
        @keyframes gridPulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }
        .login-left .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--primary-light);
            animation: floatUp 6s ease-in infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 0.9;
            }
            40% {
                opacity: 0.6;
                transform: translateY(-200px) translateX(30px) scale(1.2);
            }
            70% {
                opacity: 0.2;
                transform: translateY(-380px) translateX(-20px) scale(0.6);
            }
            100% {
                transform: translateY(-550px) translateX(10px) scale(0);
                opacity: 0;
            }
        }
        .login-left .scene-wrapper {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }
        .scene-illustration {
            width: 100%;
            aspect-ratio: 1.4/1;
            position: relative;
        }
        .scene-illustration svg {
            width: 100%;
            height: 100%;
        }
        .scene-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .scene-tag {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #c8ddf8;
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: 0.4px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s;
            white-space: nowrap;
        }
        .scene-tag:hover {
            background: rgba(93, 156, 236, 0.2);
            border-color: rgba(93, 156, 236, 0.5);
            color: #fff;
            box-shadow: 0 0 20px rgba(93, 156, 236, 0.25);
            transform: translateY(-1px);
        }
        .scene-tag .tag-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .tag-dot.green {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }
        .tag-dot.blue {
            background: #60a5fa;
            box-shadow: 0 0 8px #60a5fa;
        }
        .tag-dot.orange {
            background: #fbbf24;
            box-shadow: 0 0 8px #fbbf24;
        }
        .tag-dot.purple {
            background: #c084fc;
            box-shadow: 0 0 8px #c084fc;
        }

        .login-right {
            flex: 0.85;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            z-index: 3;
            box-shadow: -8px 0 40px rgba(0, 0, 0, 0.08);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .login-logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .login-logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #5D9CEC 0%, #3D7DD8 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 8px 28px rgba(61, 125, 216, 0.35);
            position: relative;
            overflow: hidden;
        }
        .login-logo-icon::after {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 60%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: rotate(25deg);
        }
        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 0.5px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #6b7280;
            letter-spacing: 1px;
            font-weight: 400;
        }
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-group {
            position: relative;
            width: 100%;
        }
        .input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
            font-size: 16px;
            transition: color 0.2s;
            z-index: 1;
        }
        .input-group input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14.5px;
            font-family: inherit;
            color: #1a1a2e;
            background: #f9fafb;
            transition: all 0.2s;
            outline: none;
            letter-spacing: 0.3px;
        }
        .input-group input:focus {
            border-color: #5D9CEC;
            box-shadow: 0 0 0 3px rgba(93, 156, 236, 0.10);
            background: #fff;
        }
        .input-group input:focus+.input-icon,
        .input-group input:focus~.input-icon {
            color: #5D9CEC;
        }
        .input-group input::placeholder {
            color: #b0b7c3;
        }
        .login-error {
            font-size: 13px;
            color: #ef4444;
            text-align: center;
            min-height: 20px;
            transition: all 0.3s;
            font-weight: 500;
        }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #5D9CEC 0%, #4A89D6 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(74, 137, 214, 0.3);
            position: relative;
            overflow: hidden;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(74, 137, 214, 0.4);
            background: linear-gradient(135deg, #6DACF6 0%, #5A99E6 100%);
        }
        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(74, 137, 214, 0.3);
        }
        .login-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        .login-footer {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 8px;
            line-height: 1.7;
        }
        .login-footer .copyright {
            font-weight: 500;
            color: #6b7280;
        }
        .login-footer .support {
            color: #5D9CEC;
            font-weight: 500;
            cursor: default;
        }

        /* ============ WORK PAGE ============ */
        .work-container {
            display: none;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            overflow: hidden;
        }
        .work-container.active {
            display: flex;
        }
        .login-container.hidden {
            display: none;
        }

        /* Topbar */
        .topbar {
            height: 56px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            cursor: default;
        }
        .topbar-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #5D9CEC 0%, #3D7DD8 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 10px rgba(61, 125, 216, 0.3);
        }
        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .topbar-menu {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            justify-content: center;
            list-style: none;
            height: 100%;
        }
        .topbar-menu li {
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            position: relative;
            transition: all 0.2s;
            border-radius: 8px 8px 0 0;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .topbar-menu li:hover {
            color: #5D9CEC;
            background: rgba(93, 156, 236, 0.05);
        }
        .topbar-menu li.active {
            color: #5D9CEC;
            font-weight: 600;
        }
        .topbar-menu li.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 18px;
            right: 18px;
            height: 3px;
            background: #5D9CEC;
            border-radius: 3px 3px 0 0;
        }
        .topbar-right {
            flex-shrink: 0;
            position: relative;
        }
        .avatar-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5D9CEC 0%, #4A89D6 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(74, 137, 214, 0.25);
            font-family: inherit;
        }
        .avatar-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 14px rgba(74, 137, 214, 0.4);
        }
        .avatar-dropdown {
            position: absolute;
            top: 48px;
            right: 0;
            background: #fff;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            min-width: 180px;
            overflow: hidden;
            display: none;
            z-index: 200;
            border: 1px solid var(--border);
        }
        .avatar-dropdown.show {
            display: block;
            animation: dropIn 0.2s ease-out;
        }
        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .avatar-dropdown .dropdown-item {
            padding: 12px 18px;
            cursor: pointer;
            font-size: 13.5px;
            color: #3a3d4a;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            letter-spacing: 0.3px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .avatar-dropdown .dropdown-item:hover {
            background: #f5f8fc;
            color: #5D9CEC;
        }
        .avatar-dropdown .dropdown-divider {
            height: 1px;
            background: #eef1f5;
        }

        /* Main layout */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 220px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 12px 0;
            flex-shrink: 0;
            overflow-y: auto;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.06);
        }
        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 8px;
        }
        .sidebar-menu li {
            padding: 11px 16px;
            cursor: pointer;
            font-size: 13.5px;
            color: #bcc8d6;
            border-radius: 8px;
            transition: all 0.18s;
            font-weight: 500;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        .sidebar-menu li:hover {
            background: var(--sidebar-hover);
            color: #e2e8f0;
        }
        .sidebar-menu li.active {
            background: var(--sidebar-active);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .sidebar-menu li .side-icon {
            width: 18px;
            text-align: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .content-area {
            flex: 1;
            background: var(--content-bg);
            padding: 24px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .content-header {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 0.4px;
        }
        .content-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #eef1f5;
            flex: 1;
            min-height: 200px;
        }
        .content-card .placeholder-text {
            color: #9ca3af;
            font-size: 14px;
            text-align: center;
            padding: 40px 0;
        }
        .content-card table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13.5px;
        }
        .content-card table th,
        .content-card table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f3f7;
        }
        .content-card table th {
            font-weight: 600;
            color: #4a5568;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #fafbfc;
        }
        .content-card table tr:hover td {
            background: #f9fbfd;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .badge-info {
            background: #e8f4fd;
            color: #3D7DD8;
        }
        .badge-success {
            background: #e6f7ed;
            color: #22a34a;
        }
        .badge-warning {
            background: #fef9e7;
            color: #c78b0c;
        }
        .badge-danger {
            background: #fdecea;
            color: #d93025;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }
        .modal-overlay.show {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-box {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 28px 30px;
            width: 90%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.25s ease-out;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0.92);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal-box h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a2e;
            letter-spacing: 0.4px;
        }
        .modal-box .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f3f7;
            font-size: 13.5px;
        }
        .modal-box .info-row .label {
            color: #6b7280;
            font-weight: 500;
        }
        .modal-box .info-row .value {
            color: #1a1a2e;
            font-weight: 600;
        }
        .modal-close-btn {
            margin-top: 18px;
            width: 100%;
            padding: 11px;
            background: #f0f3f7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .modal-close-btn:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #1a1a2e;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 500;
            z-index: 400;
            opacity: 0;
            transform: translateX(40px);
            transition: all 0.35s ease;
            pointer-events: none;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        .toast.success {
            background: #22a34a;
        }
        .toast.error {
            background: #d93025;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b0b7c3;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #3a5068;
        }
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #4d6580;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }
            .login-left {
                flex: 0.35;
                min-height: 200px;
            }
            .login-right {
                flex: 0.65;
            }
            .sidebar {
                width: 60px;
            }
            .sidebar-menu li span:not(.side-icon) {
                display: none;
            }
            .sidebar-menu li {
                justify-content: center;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== LOGIN PAGE ==================== -->
    <div class="login-container" id="loginPage">
        <!-- Left: Illustration -->
        <div class="login-left">
            <div class="grid-bg"></div>
            <div class="particles" id="particlesContainer"></div>
            <div class="scene-wrapper">
                <!-- SVG Scene: Industrial IoT & Digital Twin -->
                <div class="scene-illustration">
                    <svg viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg">
                        <!-- 3D Grid Floor -->
                        <defs>
                            <linearGradient id="gridGrad" x1="0" y1="0" x2="0" y2="1">

            <div class="info-row"><span class="label">角色</span><span class="value" id="modalRole">-</span></div>
            <div class="info-row"><span class="label">邮箱</span><span class="value" id="modalEmail">-</span></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ SIMULATED USER DATABASE ============
            const userDB = [
                { username: 'admin', password: 'admin123', role: '系统管理员', email: 'admin@shanqi-iot.com' },
                { username: 'user', password: 'user123', role: '普通用户', email: 'user@shanqi-iot.com' },
                { username: 'demo', password: 'demo123', role: '演示用户', email: 'demo@shanqi-iot.com' },
                { username: 'manager', password: 'manager123', role: '企业管理', email: 'manager@shanqi-iot.com' },
            ];

            let loginFailCount = 0;
            let currentUser = null;
            let currentTopMenu = 'workbench';
            let currentSideMenu = 'my-messages';

            // ============ DOM REFERENCES ============
            const loginPage = document.getElementById('loginPage');
            const workPage = document.getElementById('workPage');
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const loginError = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');
            const avatarBtn = document.getElementById('avatarBtn');
            const avatarDropdown = document.getElementById('avatarDropdown');
            const topbarMenu = document.getElementById('topbarMenu');
            const sidebarMenu = document.getElementById('sidebarMenu');
            const contentHeader = document.getElementById('contentHeader');
            const contentCard = document.getElementById('contentCard');
            const accountModal = document.getElementById('accountModal');
            const btnAccountInfo = document.getElementById('btnAccountInfo');
            const btnLogout = document.getElementById('btnLogout');
            const btnCloseModal = document.getElementById('btnCloseModal');
            const toast = document.getElementById('toast');
            const particlesContainer = document.getElementById('particlesContainer');

            // ============ PARTICLES GENERATION ============
            function generateParticles() {
                if (!particlesContainer) return;
                for (let i = 0; i < 30; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 4 + 1.5;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 90 + '%';
                    particle.style.bottom = Math.random() * 40 + '%';
                    particle.style.animationDelay = Math.random() * 8 + 's';
                    particle.style.animationDuration = (Math.random() * 8 + 5) + 's';
                    particlesContainer.appendChild(particle);
                }
            }
            generateParticles();

            // ============ TOAST ============
            function showToast(message, type = '') {
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.className = 'toast';
                }, 2500);
            }

            // ============ LOGIN LOGIC ============
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    loginError.textContent = '请输入用户名和密码';
                    return;
                }

                // Find user
                const user = userDB.find(u => u.username === username);

                if (!user) {
                    loginFailCount++;
                    loginError.textContent = '账号不存在，请检查用户名';
                    if (loginFailCount >= 3) {
                        loginError.textContent =
                            '登录失败次数过多。可用账号：admin/admin123 或 user/user123 或 demo/demo123';
                    }
                    shakeElement(loginBtn);
                    return;
                }

                if (user.password !== password) {
                    loginFailCount++;
                    loginError.textContent = '密码错误，请重新输入';
                    if (loginFailCount >= 3) {
                        loginError.textContent =
                            '登录失败次数过多。可用账号：admin/admin123 或 user/user123 或 demo/demo123';
                    }
                    shakeElement(loginBtn);
                    return;
                }

                // Success
                loginFailCount = 0;
                loginError.textContent = '';
                currentUser = user;
                doLogin(user);
            });

            function shakeElement(el) {
                el.style.animation = 'none';
                el.offsetHeight;
                el.style.animation = 'shake 0.5s ease';
                setTimeout(() => { el.style.animation = ''; }, 500);
            }

            // Add shake keyframes dynamically
            const shakeStyle = document.createElement('style');
            shakeStyle.textContent = `
                @keyframes shake {
                    0%,100% { transform: translateX(0); }
                    20% { transform: translateX(-8px); }
                    40% { transform: translateX(8px); }
                    60% { transform: translateX(-6px); }
                    80% { transform: translateX(4px); }
                }
            `;
            document.head.appendChild(shakeStyle);

            function doLogin(user) {
                loginPage.classList.add('hidden');
                workPage.classList.add('active');
                // Update avatar
                const initial = user.username.charAt(0).toUpperCase();
                avatarBtn.textContent = initial;
                // Reset menus
                currentTopMenu = 'workbench';
                currentSideMenu = 'my-messages';
                // Activate workbench top menu
                const topItems = topbarMenu.querySelectorAll('li');
                topItems.forEach(li => li.classList.remove('active'));
                const workbenchLi = topbarMenu.querySelector('li[data-menu="workbench"]');
                if (workbenchLi) workbenchLi.classList.add('active');
                // Load sidebar
                loadSidebar('workbench');
                // Load content
                updateContent('my-messages');
                // Set sidebar active
                setSidebarActive('my-messages');
                // Record login time
                currentUser._loginTime = new Date().toLocaleString('zh-CN');
                showToast('登录成功，欢迎回来！', 'success');
            }

            // ============ TOPBAR MENU ============
            topbarMenu.addEventListener('click', function(e) {
                if (e.target.tagName === 'LI' && e.target.dataset.menu) {
                    const menu = e.target.dataset.menu;
                    currentTopMenu = menu;
                    // Update active
                    const allLi = topbarMenu.querySelectorAll('li');
                    allLi.forEach(li => li.classList.remove('active'));
                    e.target.classList.add('active');
                    // Load sidebar
                    loadSidebar(menu);
                    // Set default side menu
                    const defaultSide = getDefaultSideMenu(menu);
                    currentSideMenu = defaultSide;
                    setSidebarActive(defaultSide);
                    updateContent(defaultSide);
                    // Close avatar dropdown
                    avatarDropdown.classList.remove('show');
                }
            });

            function getDefaultSideMenu(topMenu) {
                const map = {
                    'workbench': 'my-messages',
                    'enterprise': 'organization',
                    'system': 'dict-management',
                };
                return map[topMenu] || 'my-messages';
            }

            function loadSidebar(topMenu) {
                let items = [];
                switch (topMenu) {
                    case 'workbench':
                        items = [
                            { id: 'my-messages', icon: '💬', label: '我的消息' },
                            { id: 'my-todos', icon: '📝', label: '我的待办' },
                            { id: 'my-initiated', icon: '📤', label: '我的发起' },
                            { id: 'my-dashboard', icon: '📊', label: '我的看板' },
                            { id: 'my-apps', icon: '🧩', label: '我的应用' },
                        ];
                        break;
                    case 'enterprise':
                        items = [
                            { id: 'organization', icon: '🏢', label: '组织机构' },
                            { id: 'user-management', icon: '👥', label: '用户管理' },
                            { id: 'permission', icon: '🔐', label: '权限管理' },
                            { id: 'operation-log', icon: '📜', label: '操作日志' },
                        ];
                        break;
                    case 'system':
                        items = [
                            { id: 'dict-management', icon: '📖', label: '字典管理' },
                            { id: 'menu-management', icon: '📋', label: '菜单管理' },
                        ];
                        break;
                    default:
                        items = [];
                }
                sidebarMenu.innerHTML = items.map(item =>
                    `<li data-side="${item.id}" class="${item.id === currentSideMenu ? 'active' : ''}">
                        <span class="side-icon">${item.icon}</span> <span>${item.label}</span>
                    </li>`
                ).join('');
            }

            function setSidebarActive(sideId) {
                const allSideLi = sidebarMenu.querySelectorAll('li');
                allSideLi.forEach(li => li.classList.remove('active'));
                const target = sidebarMenu.querySelector(`li[data-side="${sideId}"]`);
                if (target) target.classList.add('active');
            }

            // ============ SIDEBAR CLICK ============
            sidebarMenu.addEventListener('click', function(e) {
                const li = e.target.closest('li');
                if (li && li.dataset.side) {
                    const sideId = li.dataset.side;
                    currentSideMenu = sideId;
                    setSidebarActive(sideId);
                    updateContent(sideId);
                    avatarDropdown.classList.remove('show');
                }
            });

            // ============ CONTENT UPDATE ============
            function updateContent(sideId) {
                const labelMap = {
                    'my-messages': '我的消息',
                    'my-todos': '我的待办',
                    'my-initiated': '我的发起',
                    'my-dashboard': '我的看板',
                    'my-apps': '我的应用',
                    'organization': '组织机构',
                    'user-management': '用户管理',
                    'permission': '权限管理',
                    'operation-log': '操作日志',
                    'dict-management': '字典管理',
                    'menu-management': '菜单管理',
                };
                contentHeader.textContent = labelMap[sideId] || '详情';
                contentCard.innerHTML = generateContentHTML(sideId);
            }

            function generateContentHTML(sideId) {
                switch (sideId) {
                    case 'my-messages':
                        return `
                            <table>
                                <thead><tr><th>序号</th><th>消息标题</th><th>发送人</th><th>时间</th><th>状态</th></tr></thead>
                                <tbody>
                                    <tr><td>1</td><td>设备巡检任务已下达</td><td>系统</td><td>2026-05-30 09:15</td><td><span class="badge badge-info">未读</span></td></tr>
                                    <tr><td>2</td><td>传感器数据异常预警</td><td>监控中心</td><td>2026-05-29 16:42</td><td><span class="badge badge-warning">待处理</span></td></tr>
                                    <tr><td>3</td><td>数字孪生模型更新完成</td><td>运维团队</td><td>2026-05-29 11:08</td><td><span class="badge badge-success">已读</span></td></tr>
                                    <tr><td>4</td><td>季度能耗报告已生成</td><td>数据分析</td><td>2026-05-28 14:30</td><td><span class="badge badge-success">已读</span></td></tr>
                                </tbody>
                            </table>`;
                    case 'my-todos':
                        return `
                            <table>
                                <thead><tr><th>序号</th><th>待办事项</th><th>优先级</th><th>截止时间</th><th>状态</th></tr></thead>
                                <tbody>
